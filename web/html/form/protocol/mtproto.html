{{define "form/mtproto"}}
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
  <a-alert
    type="info"
    show-icon
    :style="{ marginBottom: '10px' }"
    message='{{ i18n "pages.inbounds.mtproto.hint" }}'
  ></a-alert>
  <a-form-item label='{{ i18n "pages.inbounds.mtproto.fakeTlsDomain" }}'>
    <a-input
      v-model.trim="inbound.settings.fakeTlsDomain"
      placeholder="www.cloudflare.com"
    ></a-input>
  </a-form-item>
  <a-form-item>
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.secretDesc" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.secret" }}
        <a-icon type="sync" @click="inbound.settings.genSecret()"></a-icon>
      </a-tooltip>
    </template>
    <a-input
      v-model.trim="inbound.settings.secret"
      placeholder='{{ i18n "pages.inbounds.mtproto.secretPlaceholder" }}'
    ></a-input>
  </a-form-item>
  <a-form-item>
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.routeDesc" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.route" }}
      </a-tooltip>
    </template>
    <a-switch v-model="inbound.settings.routeThroughXray"></a-switch>
  </a-form-item>
  <a-form-item v-if="inbound.settings.routeThroughXray">
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.outboundTagDesc" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.outboundTag" }}
      </a-tooltip>
    </template>
    <a-input
      v-model.trim="inbound.settings.outboundTag"
      placeholder="proxy"
    ></a-input>
  </a-form-item>
</a-form>
{{end}}
