{{define "modals/clientsModal"}}
<a-modal
    id="client-modal"
    v-model="clientModal.visible"
    :title="clientModal.title"
    @ok="clientModal.ok"
    :confirm-loading="clientModal.confirmLoading"
    :closable="true"
    :mask-closable="false"
    :class="themeSwitcher.currentTheme"
    :ok-text="clientModal.okText"
    cancel-text='{{ i18n "close" }}'
>
    <template v-if="isEdit">
        <a-tag
            v-if="isExpiry || isTrafficExhausted"
            color="red"
            :style="{ marginBottom: '10px', display: 'block', textAlign: 'center' }"
            >Account is (Expired|Traffic Ended) And Disabled</a-tag
        >
    </template>
    {{template "form/client" .}}
</a-modal>
<script>
    const clientModal = {
        visible: false,
        confirmLoading: false,
        title: "",
        okText: "",
        isEdit: false,
        dbInbound: new DBInbound(),
        inbound: new Inbound(),
        clients: [],
        clientStats: [],
        oldClientId: "",
        index: null,
        clientIps: null,
        delayedStart: false,
        ok() {
            if (clientModal.isEdit) {
                ObjectUtil.execute(
                    clientModal.confirm,
                    clientModalApp.client,
                    clientModal.dbInbound.id,
                    clientModal.oldClientId,
                );
            } else {
                ObjectUtil.execute(
                    clientModal.confirm,
                    clientModalApp.client,
                    clientModal.dbInbound.id,
                );
            }
        },
        show({
            title = "",
            okText = '{{ i18n "sure" }}',
            index = null,
            dbInbound = null,
            confirm = () => {},
            isEdit = false,
        }) {
            this.visible = true;
            this.title = title;
            this.okText = okText;
            this.isEdit = isEdit;
            this.dbInbound = new DBInbound(dbInbound);
            this.inbound = Inbound.fromJson(dbInbound.toInbound().toJson());
            this.clients = this.inbound.clients;
            this.index = index === null ? this.clients.length : index;
            this.delayedStart = false;
            if (isEdit) {
                if (this.clients[index].expiryTime < 0) {
                    this.delayedStart = true;
                }
                this.oldClientId = this.getClientId(
                    dbInbound.protocol,
                    this.clients[index],
                );
            } else {
                this.addClient(this.inbound, this.clients);
            }
            this.clientStats = this.findClientStats(
                dbInbound.protocol,
                this.clients[this.index],
            );
            this.confirm = confirm;
        },
        isUuidClientProtocol(protocol) {
            return (
                protocol === Protocols.AMNEZIAWG ||
                protocol === Protocols.NATIVEWG
            );
        },
        getClientStatsKey(protocol, client) {
            if (!client) {
                return "";
            }
            if (this.isUuidClientProtocol(protocol)) {
                return client.id || "";
            }
            return client.email || "";
        },
        findClientStats(protocol, client) {
            if (!this.dbInbound || !this.dbInbound.clientStats || !client) {
                return null;
            }
            const clientKey = this.getClientStatsKey(protocol, client);
            return (
                this.dbInbound.clientStats.find((row) => {
                    const statsKey = this.isUuidClientProtocol(protocol)
                        ? row.uuid || ""
                        : row.email || "";
                    return statsKey === clientKey;
                }) || null
            );
        },
        getClientId(protocol, client) {
            switch (protocol) {
                case Protocols.TROJAN:
                    return client.password;
                case Protocols.SHADOWSOCKS:
                case Protocols.MIXED:
                case Protocols.HTTP:
                    // Mixed/HTTP basic-auth username is stored as email.
                    return client.email;
                case Protocols.AMNEZIAWG:
                case Protocols.NATIVEWG:
                    return client.id || "";
                case Protocols.HYSTERIA:
                    return client.auth;
                default:
                    return client.id;
            }
        },
        addClient(inbound, clients) {
            switch (inbound.protocol) {
                case Protocols.VMESS:
                    return clients.push(new Inbound.VmessSettings.VMESS());
                case Protocols.VLESS:
                    return clients.push(new Inbound.VLESSSettings.VLESS());
                case Protocols.TROJAN:
                    return clients.push(new Inbound.TrojanSettings.Trojan());
                case Protocols.SHADOWSOCKS:
                    return clients.push(
                        new Inbound.ShadowsocksSettings.Shadowsocks(
                            clients[0].method,
                            RandomUtil.randomShadowsocksPassword(
                                inbound.settings.method,
                            ),
                        ),
                    );
                case Protocols.AMNEZIAWG:
                    return clients.push(
                        new Inbound.AmneziawgSettings.AwgPeer(),
                    );
                case Protocols.NATIVEWG:
                    return clients.push(new Inbound.NativewgSettings.WgPeer());
                case Protocols.MIXED:
                    return clients.push(
                        new Inbound.MixedSettings.MixedClient(),
                    );
                case Protocols.HTTP:
                    return clients.push(
                        new Inbound.HttpSettings.HttpClient(),
                    );
                case Protocols.HYSTERIA:
                    return clients.push(new Inbound.HysteriaSettings.Hysteria());
                default:
                    return null;
            }
        },
        close() {
            clientModal.visible = false;
            clientModal.loading(false);
        },
        loading(loading = true) {
            clientModal.confirmLoading = loading;
        },
    };

    const clientModalApp = new Vue({
        delimiters: ["[[", "]]"],
        el: "#client-modal",
        data: {
            clientModal,
            get inbound() {
                return this.clientModal.inbound;
            },
            get client() {
                return this.clientModal.clients[this.clientModal.index];
            },
            get clientStats() {
                return this.clientModal.clientStats;
            },
            get isEdit() {
                return this.clientModal.isEdit;
            },
            get datepicker() {
                return app.datepicker;
            },
            get isTrafficExhausted() {
                if (!this.clientStats) return false;
                if (this.clientStats.total <= 0) return false;
                if (
                    this.clientStats.up + this.clientStats.down <
                    this.clientStats.total
                )
                    return false;
                return true;
            },
            get isExpiry() {
                return this.clientModal.isEdit && this.client.expiryTime > 0
                    ? this.client.expiryTime < new Date().getTime()
                    : false;
            },
            get delayedStart() {
                return this.clientModal.delayedStart;
            },
            set delayedStart(value) {
                this.clientModal.delayedStart = value;
            },
            get delayedExpireDays() {
                return this.client && this.client.expiryTime < 0
                    ? this.client.expiryTime / -86400000
                    : 0;
            },
            set delayedExpireDays(days) {
                this.client.expiryTime = -86400000 * days;
            },
        },
        methods: {
            async getDBClientIps(email) {
                const msg = await HttpUtil.post(
                    `/panel/api/inbounds/clientIps/${email}`,
                );
                if (!msg.success) {
                    document.getElementById("clientIPs").value = msg.obj;
                    return;
                }
                let ips = msg.obj;
                if (
                    typeof ips === "string" &&
                    ips.startsWith("[") &&
                    ips.endsWith("]")
                ) {
                    try {
                        ips = JSON.parse(ips);
                        ips = Array.isArray(ips) ? ips.join("\n") : ips;
                    } catch (e) {
                        console.error("Error parsing JSON:", e);
                    }
                }
                document.getElementById("clientIPs").value = ips;
            },
            async clearDBClientIps(email) {
                try {
                    const msg = await HttpUtil.post(
                        `/panel/api/inbounds/clearClientIps/${email}`,
                    );
                    if (!msg.success) {
                        return;
                    }
                    document.getElementById("clientIPs").value = "";
                } catch (error) {}
            },
            resetClientTraffic(client, dbInbound, iconElement) {
                this.$confirm({
                    title: '{{ i18n "pages.inbounds.resetTraffic"}}',
                    content: '{{ i18n "pages.inbounds.resetTrafficContent"}}',
                    class: themeSwitcher.currentTheme,
                    okText: '{{ i18n "reset"}}',
                    cancelText: '{{ i18n "cancel"}}',
                    onOk: async () => {
                        iconElement.disabled = true;
                        const isAwg =
                            dbInbound &&
                            dbInbound.protocol === Protocols.AMNEZIAWG;
                        const isWg =
                            dbInbound &&
                            dbInbound.protocol === Protocols.NATIVEWG;
                        const url =
                            isAwg || isWg
                                ? `/panel/api/${isAwg ? "awg" : "wg"}/client/resetTrafficByUuid/${encodeURIComponent(client.id || "")}`
                                : "/panel/api/inbounds/" +
                                  dbInbound.id +
                                  "/resetClientTraffic/" +
                                  client.email;
                        const msg = await HttpUtil.postWithModal(
                            url,
                        );
                        if (msg.success) {
                            this.clientModal.clientStats.up = 0;
                            this.clientModal.clientStats.down = 0;
                        }
                        iconElement.disabled = false;
                    },
                });
            },
        },
    });
</script>
{{end}}
