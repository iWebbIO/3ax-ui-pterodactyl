name: Cleanup Caches
on:
  schedule:
    - cron: '0 3 * * *'   # every day at 03:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches older than 1 day
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF_DATE=$(date -d "1 days ago" -Ins --utc | sed 's/+0000/Z/')
          echo "Deleting caches older than: $CUTOFF_DATE"

          CACHE_IDS=$(gh api --paginate repos/${{ github.repository }}/actions/caches \
            --jq ".actions_caches[] | select(.last_accessed_at < \"$CUTOFF_DATE\") | .id" 2>/dev/null)

          if [ -z "$CACHE_IDS" ]; then
            echo "No old caches found to delete."
          else
            echo "$CACHE_IDS" | while read CACHE_ID; do
              echo "Deleting cache: $CACHE_ID"
              gh api -X DELETE repos/${{ github.repository }}/actions/caches/$CACHE_ID
            done
            echo "Old caches deleted successfully."
          fi

      - name: Delete artifacts older than 2 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF_DATE=$(date -d "2 days ago" -Ins --utc | sed 's/+0000/Z/')
          echo "Deleting artifacts older than: $CUTOFF_DATE"

          ARTIFACT_IDS=$(gh api --paginate repos/${{ github.repository }}/actions/artifacts \
            --jq ".artifacts[] | select(.created_at < \"$CUTOFF_DATE\") | .id" 2>/dev/null)

          if [ -z "$ARTIFACT_IDS" ]; then
            echo "No old artifacts found to delete."
          else
            echo "$ARTIFACT_IDS" | while read ARTIFACT_ID; do
              echo "Deleting artifact: $ARTIFACT_ID"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID
            done
            echo "Old artifacts deleted successfully."
          fi
